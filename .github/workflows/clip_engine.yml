name: Independent Automated Clipping Pipeline

on:
  push:
    paths:
      - 'video_pool.txt'

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
    - name: Access Repository Context
      uses: actions/checkout@v4

    - name: Initialize Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Deploy Binary Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg imagemagick
        sudo sed -i 's/domain="path" rights="none"/domain="path" rights="read|write"/g' /etc/ImageMagick-6/policy.xml

    - name: Install Compute Core Libraries & Downloader
      run: |
        pip install numpy pydub moviepy yt-dlp

    - name: Parse Pipeline Target Input
      id: fetch-url
      run: |
        URL=$(head -n 1 video_pool.txt)
        echo "TARGET_URL=$URL" >> $GITHUB_ENV

    - name: Run Processing Automation Pipeline (Direct YouTube Download)
      run: |
        #yt-dlp automatically extracts the best video stream natively on the runner
        yt-dlp -f "best[ext=mp4]" "${{ env.TARGET_URL }}" -o target_source.mp4
        python process_video.py target_source.mp4

    - name: Optimize Generated Asset Registry
      run: |
        echo "[" > public/clips/registry.json
        first=true
        for file in public/clips/*.mp4; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            if [ "$first" = true ]; then first=false; else echo "," >> public/clips/registry.json; fi
            echo "\"$filename\"" >> public/clips/registry.json
          fi
        done
        echo "]" >> public/clips/registry.json

    - name: Direct Deploy Payload to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
